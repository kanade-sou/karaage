<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（スマホ最適・最終安定版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<style>
:root{
  --bg:#ffffff;
  --panel:#f3f4f6;
  --text:#111827;
  --accent:#2563eb;
  --danger:#dc2626;
  --ok:#16a34a;
  --ref:#f59e0b;
}

body{
  margin:0;
  padding:10px;
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}

h3{margin:6px 0 10px;}

canvas{
  width:100%;
  height:50vh;
  background:#e5e7eb;
  border:2px solid #d1d5db;
  border-radius:6px;
  touch-action:none;
}

.fullscreen{
  position:fixed!important;
  inset:0;
  width:100vw!important;
  height:100vh!important;
  z-index:1000;
  border-radius:0;
}

#exitLayer{
  position:fixed;
  inset:0;
  z-index:1001;
  display:none;
}
#exitLayer.active{
  display:block;
}

.hide{display:none!important;}

.panel{
  background:var(--panel);
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
  font-weight:bold;
  border:none;
  border-radius:6px;
}

.primary{background:var(--accent);color:white;}
.refbtn{background:var(--ref);color:white;}
.fullbtn{background:#111827;color:white;}
.reset{background:#9ca3af;color:white;}

.ok{color:var(--ok);}
.ng{color:var(--danger);}
</style>
</head>

<body>

<h3>高さ推定ツール（最終安定版）</h3>

<input type="file" id="fileInput" accept="image/*">

<canvas id="canvas"></canvas>
<div id="exitLayer"></div>

<button id="fullBtn" class="fullbtn">📱 写真を拡大して操作</button>

<div class="panel" id="panel">
  <button class="primary" id="calcBtn">計算</button>
  <button class="refbtn" id="refBtn">参照物で校正</button>
  <button class="reset" id="resetBtn">リセット</button>
  <div id="status"></div>
  <div id="summary"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const panel = document.getElementById("panel");
const fullBtn = document.getElementById("fullBtn");
const exitLayer = document.getElementById("exitLayer");

let img = new Image();
let points = [];
let refPoints = [];
let draggingPoint = null;

let scale = 1;
let offsetX = 0, offsetY = 0;
let startDist = null;
let startScale = 1;
let lastTouch = null;
let refMode = false;
let isFull = false;

let lastTap = 0;

// ===== 描画 =====
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);
  drawPoints(points,"#dc2626");
  drawPoints(refPoints,"#f59e0b");
}

function drawPoints(arr,color){
  ctx.fillStyle=color;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,8/scale,0,Math.PI*2);
    ctx.fill();
  });
}

// ===== 座標変換 =====
function getPos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:(e.clientX-r.left-offsetX)/scale,
    y:(e.clientY-r.top-offsetY)/scale
  };
}

function nearestPoint(pos){
  return [...points,...refPoints].find(p =>
    Math.hypot(p.x-pos.x,p.y-pos.y)<15/scale
  );
}

// ===== ポインター操作 =====
canvas.addEventListener("pointerdown",e=>{
  canvas.setPointerCapture(e.pointerId);
  const pos=getPos(e);
  draggingPoint=nearestPoint(pos);

  if(!draggingPoint){
    const arr=refMode?refPoints:points;
    if(arr.length<2){
      arr.push(pos);
      draw();
    }
  }
  lastTouch={x:e.clientX,y:e.clientY};
});

canvas.addEventListener("pointermove",e=>{
  if(draggingPoint){
    const pos=getPos(e);
    draggingPoint.x=pos.x;
    draggingPoint.y=pos.y;
    draw();
  }else if(lastTouch){
    offsetX+=e.clientX-lastTouch.x;
    offsetY+=e.clientY-lastTouch.y;
    lastTouch={x:e.clientX,y:e.clientY};
    draw();
  }
});

canvas.addEventListener("pointerup",()=>{
  draggingPoint=null;
  lastTouch=null;
});

// ===== ピンチズーム =====
canvas.addEventListener("touchstart",e=>{
  if(e.touches.length===2){
    startDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    startScale=scale;
  }
});

canvas.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    const d=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    scale=startScale*(d/startDist);
    draw();
  }
});

// ===== フルスクリーン制御 =====
function enterFullscreen(){
  isFull=true;
  canvas.classList.add("fullscreen");
  panel.classList.add("hide");
  exitLayer.classList.add("active");
  fullBtn.textContent="← 設定画面に戻る";
  draw();
}

function exitFullscreen(){
  isFull=false;
  canvas.classList.remove("fullscreen");
  panel.classList.remove("hide");
  exitLayer.classList.remove("active");
  fullBtn.textContent="📱 写真を拡大して操作";
  draw();
}

fullBtn.onclick=()=>{
  isFull ? exitFullscreen() : enterFullscreen();
};

// ✅ ダブルタップで必ず戻る
exitLayer.addEventListener("touchend",()=>{
  const now=Date.now();
  if(now-lastTap<300){
    exitFullscreen();
  }
  lastTap=now;
});

// ===== 校正・操作 =====
refBtn.onclick=()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定";
};

resetBtn.onclick=()=>{
  points=[];
  refPoints=[];
  scale=1;
  offsetX=offsetY=0;
  draw();
};

// ===== 画像読み込み =====
fileInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      canvas.width=canvas.clientWidth;
      canvas.height=canvas.clientHeight;
      scale=Math.min(
        canvas.width/img.width,
        canvas.height/img.height
      );
      offsetX=(canvas.width-img.width*scale)/2;
      offsetY=(canvas.height-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
};
</script>
</body>
</html>
