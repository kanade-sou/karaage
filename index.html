<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（スマホ完全版・最終）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;}
header{padding:8px 12px;font-size:14px;background:#f3f4f6;}
canvas{
  display:block;
  width:100vw;
  height:65vh;
  background:#ddd;
  touch-action:none;
}
.panel{padding:10px;}
button,input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:15px;
}
.snap-option{
  display:flex;gap:10px;align-items:center;
  margin-top:8px;padding:10px;
  background:#f9fafb;border-radius:6px;
}
.refbtn{background:#f59e0b;color:#fff;font-weight:bold;}
.primary{background:#2563eb;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;}
.ng{color:#dc2626;}
</style>
</head>

<body>

<header>
①参照物 → ②測定対象 → ③計算  
（ピンチ拡大／ドラッグ移動／点は再調整可）
</header>

<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">

  <!-- ✅ 傾き補正 -->
  <label>画像の傾き補正（水平合わせ）</label>
  <input type="range" id="rotateRange" min="-10" max="10" step="0.1" value="0">

  <input type="number" id="refLen" value="100" placeholder="参照物の高さ（cm）">

  <div class="snap-option">
    <input type="checkbox" id="snapVertical" checked>
    <label>垂直スナップ</label>
  </div>

  <button id="refBtn" class="refbtn">参照物を指定</button>
  <button id="calcBtn" class="primary">計算</button>
  <button id="resetBtn" class="reset">リセット</button>

  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let img=new Image();
let scale=1, offsetX=0, offsetY=0;
let rotation=0;

let points=[], refPoints=[], refMode=false;
let draggingPoint=null;

let startTouches=[], tapStart=null, moved=false;

/* ===== canvas ===== */
function resize(){
  canvas.width=canvas.clientWidth;
  canvas.height=canvas.clientHeight;
  draw();
}
window.addEventListener("resize",resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.translate(offsetX,offsetY);
  ctx.scale(scale,scale);
  ctx.rotate(rotation);

  ctx.drawImage(img,0,0);

  drawLine(refPoints,"#f59e0b");
  drawLine(points,"#dc2626");
}

function drawLine(arr,color){
  if(arr.length===2){
    ctx.strokeStyle=color;
    ctx.lineWidth=3/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

/* ===== 座標変換 ===== */
function screenToWorld(x,y){
  x=(x-offsetX)/scale;
  y=(y-offsetY)/scale;
  const cos=Math.cos(-rotation), sin=Math.sin(-rotation);
  return { x:x*cos-y*sin, y:x*sin+y*cos };
}

/* ===== 高解像度画像縮小 ===== */
function downscaleImage(image, max=2048){
  const r=Math.min(1,max/Math.max(image.width,image.height));
  if(r===1) return image;

  const c=document.createElement("canvas");
  c.width=image.width*r;
  c.height=image.height*r;
  c.getContext("2d").drawImage(image,0,0,c.width,c.height);

  const i=new Image();
  i.src=c.toDataURL();
  return i;
}

/* ===== タッチ ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  startTouches=[...e.touches];
  moved=false;

  if(e.touches.length===1){
    tapStart={x:e.touches[0].clientX,y:e.touches[0].clientY};

    const p=screenToWorld(tapStart.x,tapStart.y);
    [...points,...refPoints].forEach(pt=>{
      if(Math.hypot(pt.x-p.x,pt.y-p.y)<10/scale){
        draggingPoint=pt;
      }
    });
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  moved=true;

  if(draggingPoint && e.touches.length===1){
    const p=screenToWorld(e.touches[0].clientX,e.touches[0].clientY);
    draggingPoint.x=p.x;
    draggingPoint.y=p.y;
    draw();
    return;
  }

  if(e.touches.length===2 && startTouches.length===2){
    const [a,b]=e.touches,[a0,b0]=startTouches;
    const cx=(a.clientX+b.clientX)/2;
    const cy=(a.clientY+b.clientY)/2;

    const wx=(cx-offsetX)/scale;
    const wy=(cy-offsetY)/scale;

    scale*=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)/
           Math.hypot(a0.clientX-b0.clientX,a0.clientY-b0.clientY);
    scale=Math.min(Math.max(scale,0.2),10);

    offsetX=cx-wx*scale;
    offsetY=cy-wy*scale;
  }

  startTouches=[...e.touches];
  draw();
},{passive:false});

canvas.addEventListener("touchend",()=>{
  draggingPoint=null;
  tapStart=null;
  startTouches=[];
});

/* ===== 傾き補正 ===== */
rotateRange.oninput=e=>{
  rotation=e.target.value*Math.PI/180;
  draw();
};

/* ===== ボタン ===== */
refBtn.onclick=()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定してください。";
};

calcBtn.onclick=()=>{
  if(refPoints.length!==2||points.length!==2){
    result.innerHTML="<span class='ng'>参照物と測定対象を指定してください</span>";
    return;
  }
  const refCm=Number(refLen.value);
  const h=Math.abs(points[1].y-points[0].y)/
          Math.abs(refPoints[1].y-refPoints[0].y)*refCm;
  result.innerHTML=`<span class="ok">推定高さ ${h.toFixed(1)} cm</span>`;
};

resetBtn.onclick=()=>{
  points=[];refPoints=[];refMode=false;
  scale=1;offsetX=0;offsetY=0;rotation=0;
  rotateRange.value=0;
  status.textContent="";result.textContent="";
  draw();
};

/* ===== 画像読込 ===== */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      img=downscaleImage(img);
      img.onload=()=>{
        scale=canvas.clientWidth/img.width;
        offsetX=0;
        offsetY=(canvas.clientHeight-img.height*scale)/2;
        draw();
      };
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
