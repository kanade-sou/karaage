<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（スマホ完全対応・最終安定版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;}
header{padding:8px 12px;font-size:14px;background:#f3f4f6;}
canvas{
  display:block;
  width:100vw;
  height:70vh;
  background:#ddd;
  touch-action:none;
}
.panel{padding:10px;}
button,input{width:100%;padding:10px;margin-top:6px;font-size:15px;}
.refbtn{background:#f59e0b;color:#fff;font-weight:bold;}
.primary{background:#2563eb;color:#fff;font-weight:bold;}
.ok{color:#16a34a;}
.ng{color:#dc2626;}
.option{display:flex;align-items:center;gap:8px;margin-top:6px;}
</style>
</head>

<body>

<header>
①参照物 → ②測定対象 → ③計算  
（ピンチで拡大／1本指で移動）
</header>

<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">
  <input type="number" id="shootDist" placeholder="撮影距離（m・任意）" step="0.1">
  <input type="number" id="refLen" value="100" placeholder="参照物の高さ（cm）">

  <div class="option">
    <input type="checkbox" id="snapVertical" checked>
    <label for="snapVertical">垂直スナップ</label>
  </div>

  <button id="refBtn" class="refbtn">参照物を指定</button>
  <button id="calcBtn" class="primary">計算</button>

  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const snapCheckbox = document.getElementById("snapVertical");
const status = document.getElementById("status");
const result = document.getElementById("result");

let img = new Image();
let scale = 1, offsetX = 0, offsetY = 0;
let points = [], refPoints = [], refMode = false;

let startTouches = [];
let touchStartPos = null;

/* DPR */
function resize(){
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width * dpr;
  canvas.height = r.height * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
window.addEventListener("resize", resize);
resize();

/* 描画 */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);
  drawLine(refPoints,"orange");
  drawLine(points,"red");
}
function drawLine(arr,color){
  if(arr.length===2){
    ctx.strokeStyle=color;
    ctx.lineWidth=2/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

/* 座標 */
function getPos(x,y){
  return {x:(x-offsetX)/scale,y:(y-offsetY)/scale};
}

/* 垂直スナップ */
function applyVerticalSnap(arr){
  if(arr.length===2 && snapCheckbox.checked){
    const x = (arr[0].x + arr[1].x)/2;
    arr[0].x = arr[1].x = x;
  }
}

/* タッチ */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  startTouches = [...e.touches];
  if(e.touches.length===1){
    touchStartPos = {x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===2 && startTouches.length===2){
    const [a,b]=e.touches,[a0,b0]=startTouches;
    scale *= Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY) /
             Math.hypot(a0.clientX-b0.clientX,a0.clientY-b0.clientY);
  }else if(e.touches.length===1 && startTouches.length===1){
    offsetX += e.touches[0].clientX - startTouches[0].clientX;
    offsetY += e.touches[0].clientY - startTouches[0].clientY;
  }
  startTouches = [...e.touches];
  draw();
});

canvas.addEventListener("touchend",e=>{
  if(touchStartPos && e.changedTouches.length===1){
    const t=e.changedTouches[0];
    const dist=Math.hypot(t.clientX-touchStartPos.x,t.clientY-touchStartPos.y);

    if(dist < 10){ // ✅ タップ判定
      const p=getPos(t.clientX,t.clientY);
      const arr=refMode?refPoints:points;
      if(arr.length<2){
        arr.push(p);
        applyVerticalSnap(arr);
        if(refMode && refPoints.length===2){
          refMode=false;
          status.textContent="参照物設定完了。次に測定対象。";
        }
      }
      draw();
    }
  }
  startTouches=[];
  touchStartPos=null;
});

/* ボタン */
refBtn.onclick=()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定してください。";
};

calcBtn.onclick=()=>{
  if(refPoints.length!==2||points.length!==2){
    result.innerHTML="<span class='ng'>点が足りません</span>";
    return;
  }
  const refCm=Number(refLen.value);
  const h=Math.abs(points[1].y-points[0].y)/
          Math.abs(refPoints[1].y-refPoints[0].y)*refCm;
  result.innerHTML=`<span class="ok">推定高さ ${h.toFixed(1)} cm</span>`;
};

/* 画像 */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>

</body>
</html>
