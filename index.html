<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（スマホ完全版・安定）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;}
header{padding:8px 12px;font-size:14px;background:#f3f4f6;}
canvas{
  display:block;
  width:100vw;
  height:70vh;
  background:#ddd;
  touch-action:none;
}
.panel{padding:10px;}
button,input{width:100%;padding:10px;margin-top:6px;font-size:15px;}
.snap-option{
  display:flex;align-items:center;gap:10px;
  margin-top:8px;padding:10px;
  background:#f9fafb;border-radius:6px;
}
.snap-option input{width:22px;height:22px;}
.refbtn{background:#f59e0b;color:#fff;font-weight:bold;}
.primary{background:#2563eb;color:#fff;font-weight:bold;}
.ok{color:#16a34a;}
.ng{color:#dc2626;}
</style>
</head>

<body>

<header>
①参照物 → ②測定対象 → ③計算  
（ピンチで拡大／1本指で移動）
</header>

<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">
  <input type="number" id="shootDist" placeholder="撮影距離（m・任意）" step="0.1">
  <input type="number" id="refLen" value="100" placeholder="参照物の高さ（cm）">

  <div class="snap-option">
    <input type="checkbox" id="snapVertical" checked>
    <label for="snapVertical">垂直スナップ（上下点を完全に揃える）</label>
  </div>

  <button id="refBtn" class="refbtn">参照物を指定</button>
  <button id="calcBtn" class="primary">計算</button>

  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const snapCheckbox = document.getElementById("snapVertical");
const status = document.getElementById("status");
const result = document.getElementById("result");

let img = new Image();

/* ===== view状態 ===== */
let scale = 1;
let offsetX = 0;
let offsetY = 0;

/* ===== 点管理 ===== */
let points = [];
let refPoints = [];
let refMode = false;

/* ===== タッチ管理 ===== */
let startTouches = [];
let tapStart = null;
let moved = false;

/* ===== DPR安全canvas ===== */
function resize(){
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
window.addEventListener("resize", resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.restore();

  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);

  drawLine(refPoints,"#f59e0b");
  drawLine(points,"#dc2626");
}

function drawLine(arr,color){
  if(arr.length===2){
    ctx.strokeStyle=color;
    ctx.lineWidth=3/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

/* ===== 座標変換（ズレ防止の核心） ===== */
function screenToWorld(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;
  return {
    x:(x - offsetX) / scale,
    y:(y - offsetY) / scale
  };
}

/* ===== 垂直スナップ ===== */
function applyVerticalSnap(arr){
  if(arr.length===2 && snapCheckbox.checked){
    arr[1].x = arr[0].x;
  }
}

/* ===== タッチ操作 ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  startTouches=[...e.touches];
  moved=false;
  if(e.touches.length===1){
    tapStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  moved=true;

  if(e.touches.length===2 && startTouches.length===2){
    const [a,b]=e.touches;
    const [a0,b0]=startTouches;

    const cx=(a.clientX+b.clientX)/2;
    const cy=(a.clientY+b.clientY)/2;
    const before=screenToWorld(cx,cy);

    const d0=Math.hypot(a0.clientX-b0.clientX,a0.clientY-b0.clientY);
    const d1=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);

    scale*=d1/d0;
    scale=Math.min(Math.max(scale,0.2),10);

    const after=screenToWorld(cx,cy);
    offsetX+=(after.x-before.x)*scale;
    offsetY+=(after.y-before.y)*scale;
  }

  if(e.touches.length===1 && startTouches.length===1){
    offsetX+=e.touches[0].clientX-startTouches[0].clientX;
    offsetY+=e.touches[0].clientY-startTouches[0].clientY;
  }

  startTouches=[...e.touches];
  draw();
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(tapStart && !moved && e.changedTouches.length===1){
    const t=e.changedTouches[0];
    if(Math.hypot(t.clientX-tapStart.x,t.clientY-tapStart.y)<8){
      const p=screenToWorld(t.clientX,t.clientY);
      const arr=refMode?refPoints:points;
      if(arr.length<2){
        arr.push(p);
        applyVerticalSnap(arr);
        if(refMode && arr.length===2){
          refMode=false;
          status.textContent="参照物設定完了。次に測定対象を指定してください。";
        }
      }
      draw();
    }
  }
  tapStart=null;
  startTouches=[];
});

/* ===== ボタン ===== */
refBtn.onclick=()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定してください。";
};

calcBtn.onclick=()=>{
  if(refPoints.length!==2||points.length!==2){
    result.innerHTML="<span class='ng'>参照物と測定対象を指定してください</span>";
    return;
  }
  const refCm=Number(refLen.value);
  const h=Math.abs(points[1].y-points[0].y)/
          Math.abs(refPoints[1].y-refPoints[0].y)*refCm;
  result.innerHTML=`<span class="ok">推定高さ ${h.toFixed(1)} cm</span>`;
};

/* ===== 画像読み込み ===== */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      points=[];refPoints=[];refMode=false;
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      status.textContent="画像を読み込みました。参照物を指定してください。";
      result.textContent="";
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
