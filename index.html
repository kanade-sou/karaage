<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（最終完全版・iPhone 17対応）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;padding:10px;font-family:system-ui,-apple-system,sans-serif;}
canvas{
  width:100%;height:50vh;
  background:#e5e7eb;
  border:2px solid #d1d5db;
  border-radius:6px;
  touch-action:none;
}
.panel{
  background:#f3f4f6;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
button,input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
  border-radius:6px;
}
.primary{background:#2563eb;color:#fff;font-weight:bold;}
.refbtn{background:#f59e0b;color:#fff;font-weight:bold;}
.reset{background:#9ca3af;color:#fff;font-weight:bold;}
.ok{color:#16a34a;}
.ng{color:#dc2626;}
small{color:#4b5563;}
</style>
</head>

<body>

<h3>高さ推定ツール（最終完全版）</h3>
<small>
①参照物 → ②測定対象 → ③計算  
（iPhone世代別選択・垂直スナップ対応）
</small>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div class="panel">

  <!-- ✅ 年表記なし・世代名のみ -->
  <label>
    使用しているiPhone
    <select id="iphoneSelect">
      <option value="standard" selected>iPhone XR / XS / XS Max</option>
      <option value="standard">iPhone 11 / 11 Pro / 11 Pro Max</option>
      <option value="standard">iPhone 12 / 12 mini / 12 Pro / 12 Pro Max</option>
      <option value="standard">iPhone 13 / 13 mini / 13 Pro / 13 Pro Max</option>
      <option value="standard">iPhone 14 / 14 Plus / 14 Pro / 14 Pro Max</option>
      <option value="standard">iPhone 15 / 15 Plus / 15 Pro / 15 Pro Max</option>
      <option value="standard">iPhone 16 / 16 Plus / 16 Pro / 16 Pro Max</option>
      <option value="standard">iPhone 17 / 17 Plus / 17 Pro / 17 Pro Max</option>
      <option value="standard">iPhone SE（第2・第3世代）</option>
      <option value="ultra">iPhone（0.5× 超広角で撮影）</option>
      <option value="tele">iPhone Pro系（2× / 3× / 5× 望遠）</option>
    </select>
  </label>

  <label>
    <input type="checkbox" id="snapVertical" checked>
    垂直スナップを有効にする
  </label>

  <label>
    参照物の実寸（cm）
    <input type="number" id="refLen" value="100" min="1">
  </label>

  <button id="refBtn" class="refbtn">参照物を指定</button>
  <button id="calcBtn" class="primary">計算</button>
  <button id="resetBtn" class="reset">リセット</button>

  <div id="status"></div>
  <div id="summary"></div>
</div>

<script>
const POINT_RADIUS=3, HIT_RADIUS=16;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const status=document.getElementById("status");
const summary=document.getElementById("summary");
const snapCheckbox=document.getElementById("snapVertical");

let img=new Image();
let points=[], refPoints=[];
let refMode=false;
let scale=1, offsetX=0, offsetY=0;

/* DPR対応 */
function resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  const r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr;
  canvas.height=r.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* 描画 */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);
  drawLine(refPoints,"#f59e0b");
  drawLine(points,"#dc2626");
  drawPoints(refPoints,"#f59e0b");
  drawPoints(points,"#dc2626");
}
function drawPoints(arr,c){
  ctx.fillStyle=c;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,POINT_RADIUS/scale,0,Math.PI*2);
    ctx.fill();
  });
}
function drawLine(arr,c){
  if(arr.length===2){
    ctx.strokeStyle=c;
    ctx.lineWidth=2/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

/* 座標 */
function getPos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:(e.clientX-r.left-offsetX)/scale,
    y:(e.clientY-r.top-offsetY)/scale
  };
}

/* 垂直スナップ */
function applyVerticalSnap(arr){
  if(arr.length===2 && snapCheckbox.checked){
    const x=(arr[0].x+arr[1].x)/2;
    arr[0].x=x;
    arr[1].x=x;
  }
}

/* 操作 */
canvas.onpointerdown=e=>{
  const pos=getPos(e);
  const arr=refMode?refPoints:points;
  if(arr.length<2){
    arr.push(pos);
    applyVerticalSnap(arr);
    if(refMode && refPoints.length===2){
      refMode=false;
      status.textContent="参照物設定完了。次に測定対象を指定してください。";
    }
    draw();
  }
};

/* ボタン */
refBtn.onclick=()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定してください。";
};

calcBtn.onclick=()=>{
  if(refPoints.length!==2||points.length!==2){
    status.innerHTML="<span class='ng'>参照物と測定対象を指定してください。</span>";
    return;
  }
  const refCm=Number(refLen.value);
  const refPx=Math.abs(refPoints[1].y-refPoints[0].y);
  const tgtPx=Math.abs(points[1].y-points[0].y);
  const hM=(tgtPx/refPx)*(refCm/100);
  summary.innerHTML=`<div class="ok">
    推定高さ：<b>${(hM*100).toFixed(1)} cm</b><br>
    (${hM.toFixed(2)} m)
  </div>`;
};

resetBtn.onclick=()=>{
  points=[]; refPoints=[];
  status.textContent=""; summary.textContent="";
  draw();
};

/* 画像 */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      resizeCanvas();
      scale=Math.min(canvas.clientWidth/img.width,canvas.clientHeight/img.height);
      offsetX=(canvas.clientWidth-img.width*scale)/2;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};

window.addEventListener("resize",()=>{resizeCanvas();draw();});
</script>

</body>
</html>
