<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ完結｜ケーブル地上高測定ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;}
header{
  padding:10px;
  font-size:15px;
  font-weight:bold;
  background:linear-gradient(90deg,#2563eb,#06b6d4);
  color:#fff;
}
canvas{
  width:100vw;
  height:60vh;
  background:#e5e7eb;
  touch-action:none;
}
.panel{padding:12px;}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
}
.ref{background:#f59e0b;color:#fff;font-weight:bold;}
.calc{background:#dc2626;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;font-weight:bold;}
.ng{color:#dc2626;font-weight:bold;}
.guide{font-size:13px;color:#374151;margin-top:6px;}
</style>
</head>

<body>

<header>
📱 スマホ完結｜ケーブル地上高測定ツール
</header>

<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">

  <select id="device">
    <option value="">📱 iPhone機種を選択</option>
    <option value="ip15">iPhone 15 Pro / Pro Max</option>
    <option value="ip14">iPhone 14 / 14 Pro</option>
    <option value="ip13">iPhone 13 / 13 Pro</option>
    <option value="ip12">iPhone 12</option>
    <option value="ipse">iPhone SE (第2・3世代)</option>
  </select>

  <input type="number" id="shootDist" placeholder="📏 撮影距離（m）">
  <input type="number" id="refHeight" placeholder="📐 参照物の高さ（m）">

  <button id="refBtn" class="ref">🟠 参照物を指定</button>
  <button id="calcBtn" class="calc">🔴 高さを計算</button>
  <button id="resetBtn" class="reset">↺ リセット</button>

  <div id="result"></div>
  <div class="guide">
    ①参照物→②ケーブルを上下2点指定（点はドラッグ可）
  </div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let img=new Image();
let scale=1,offsetX=0,offsetY=0;

let refPoints=[], cablePoints=[];
let mode="ref"; // "ref" or "cable"
let draggingPoint=null;
let spiral=null;

/* iPhoneカメラDB */
const cameraDB={
  ip15:{f:6.86,sensor:7.6},
  ip14:{f:6.86,sensor:7.6},
  ip13:{f:5.7,sensor:7.6},
  ip12:{f:4.25,sensor:7.6},
  ipse:{f:4.15,sensor:6.4}
};

function resize(){
  canvas.width=canvas.clientWidth;
  canvas.height=canvas.clientHeight;
  draw();
}
window.addEventListener("resize",resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);

  drawLine(refPoints,"#f59e0b");
  drawLine(cablePoints,"#dc2626");
  drawPoints(refPoints,"#f59e0b");
  drawPoints(cablePoints,"#dc2626");
  drawSpiral();
}

function drawLine(arr,color){
  if(arr.length===2){
    ctx.strokeStyle=color;
    ctx.lineWidth=3/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

function drawPoints(arr,color){
  const r=8/scale;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
    ctx.lineWidth=2/scale;
    ctx.strokeStyle="#fff";
    ctx.stroke();
  });
}

/* ===== らせん ===== */
function drawSpiral(){
  if(!spiral) return;
  const {x,y,t,color}=spiral;
  ctx.strokeStyle=color;
  ctx.lineWidth=2/scale;
  ctx.beginPath();
  for(let a=0;a<t;a+=0.25){
    const r=4*a;
    ctx.lineTo(x+r*Math.cos(a), y+r*Math.sin(a));
  }
  ctx.stroke();
  spiral.t+=0.5;
  if(spiral.t<8) requestAnimationFrame(draw);
  else spiral=null;
}

/* ===== 座標変換 ===== */
function screenToWorld(x,y){
  return {x:(x-offsetX)/scale,y:(y-offsetY)/scale};
}

/* ===== 点ヒット判定（スクリーン座標） ===== */
function hitTest(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const sx=clientX-rect.left;
  const sy=clientY-rect.top;
  const r=15;

  for(const p of [...refPoints,...cablePoints]){
    const px=p.x*scale+offsetX;
    const py=p.y*scale+offsetY;
    if(Math.hypot(px-sx,py-sy)<=r) return p;
  }
  return null;
}

/* ===== タッチ操作 ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  const t=e.touches[0];
  draggingPoint=hitTest(t.clientX,t.clientY);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();

  if(draggingPoint && e.touches.length===1){
    const t=e.touches[0];
    const p=screenToWorld(t.clientX,t.clientY);
    draggingPoint.x=p.x;
    draggingPoint.y=p.y;
    draw();
    return;
  }

  if(e.touches.length===2){
    const [a,b]=e.touches;
    const cx=(a.clientX+b.clientX)/2;
    const cy=(a.clientY+b.clientY)/2;
    const wx=(cx-offsetX)/scale;
    const wy=(cy-offsetY)/scale;
    scale*=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)/
           Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    offsetX=cx-wx*scale;
    offsetY=cy-wy*scale;
    draw();
  }
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!draggingPoint){
    const t=e.changedTouches[0];
    const p=screenToWorld(t.clientX,t.clientY);
    const arr=(mode==="ref")?refPoints:cablePoints;
    if(arr.length<2){
      arr.push(p);
      spiral={x:p.x,y:p.y,t:0,color:(mode==="ref")?"#f59e0b":"#dc2626"};
      if(mode==="ref" && arr.length===2) mode="cable";
      draw();
    }
  }
  draggingPoint=null;
});

/* ===== ボタン ===== */
refBtn.onclick=()=>{
  mode="ref";
  refPoints=[];
  cablePoints=[];
  result.textContent="";
};

calcBtn.onclick=()=>{
  const dev=device.value;
  if(!dev||refPoints.length!==2||cablePoints.length!==2){
    result.innerHTML="<span class='ng'>入力が不足しています</span>";
    return;
  }

  const D=Number(shootDist.value);
  const Hr=Number(refHeight.value);

  const cam=cameraDB[dev];
  const fpx=cam.f*img.width/cam.sensor;

  const href=Math.abs(refPoints[1].y-refPoints[0].y);
  const hc=Math.abs(cablePoints[1].y-cablePoints[0].y);

  const scaleCorr=Hr/(href/fpx*D);
  const H=hc/fpx*D*scaleCorr;

  result.innerHTML=`<span class="ok">✅ ケーブル地上高：${H.toFixed(2)} m</span>`;
};

resetBtn.onclick=()=>{
  img.src="";
  refPoints=[];
  cablePoints=[];
  mode="ref";
  scale=1;
  offsetX=0;
  offsetY=0;
  result.textContent="";
  draw();
};

/* ===== 画像 ===== */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>

</body>
</html>
