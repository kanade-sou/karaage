<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（最終完全版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:10px;
  font-family:system-ui,-apple-system,sans-serif;
}
h3{margin:4px 0;}
small{color:#4b5563;}

canvas{
  width:100%;
  height:50vh;
  background:#e5e7eb;
  border:2px solid #d1d5db;
  border-radius:6px;
  touch-action:none;
}

/* フルスクリーン */
canvas.fullscreen{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  z-index:1000;
  border-radius:0;
}

.panel{
  background:#f3f4f6;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
.panel.hide{display:none;}

.section{
  background:#fff;
  padding:8px;
  border-radius:6px;
  margin-top:8px;
}

button,input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:15px;
  border-radius:6px;
}

.primary{background:#2563eb;color:#fff;font-weight:bold;}
.refbtn{background:#f59e0b;color:#fff;font-weight:bold;}
.reset{background:#9ca3af;color:#fff;font-weight:bold;}
.ok{color:#16a34a;}
.ng{color:#dc2626;}

.option-row{
  display:flex;
  align-items:center;
  gap:10px;
}
.option-row input{width:auto;transform:scale(1.2);}

/* 初回ガイド */
#guideOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:2000;
  display:none;
  align-items:center;
  justify-content:center;
}
#guideOverlay.active{display:flex;}
#guideOverlay .box{
  background:#111;
  color:#fff;
  padding:20px;
  border-radius:12px;
  max-width:90%;
  text-align:center;
}
</style>
</head>

<body>

<h3>高さ推定ツール（最終完全版）</h3>
<small>①参照物 → ②測定対象 → ③計算</small>

<input type="file" id="fileInput" accept="image/*">

<canvas id="canvas"></canvas>

<!-- 初回ガイド -->
<div id="guideOverlay">
  <div class="box">
    <h3>使い方</h3>
    <p>
      ・写真はピンチで拡大できます<br>
      ・上下2点をタップしてください<br>
      ・黄：参照物 / 赤：測定対象
    </p>
    <p style="opacity:.7">画面をタップして開始</p>
  </div>
</div>

<div class="panel" id="panel">

  <div class="section">
    <label>
      使用しているiPhone
      <select>
        <option>iPhone XR / XS / XS Max</option>
        <option>iPhone 11 / 11 Pro / 11 Pro Max</option>
        <option>iPhone 12 / 12 mini / 12 Pro / 12 Pro Max</option>
        <option>iPhone 13 / 13 mini / 13 Pro / 13 Pro Max</option>
        <option>iPhone 14 / 14 Plus / 14 Pro / 14 Pro Max</option>
        <option>iPhone 15 / 15 Plus / 15 Pro / 15 Pro Max</option>
        <option>iPhone 16 / 16 Plus / 16 Pro / 16 Pro Max</option>
        <option>iPhone 17 / 17 Plus / 17 Pro / 17 Pro Max</option>
        <option>iPhone SE（第2・第3世代）</option>
      </select>
    </label>
  </div>

  <div class="section">
    <div class="option-row">
      <input type="checkbox" id="snapVertical" checked>
      <label for="snapVertical">垂直スナップを有効にする</label>
    </div>
  </div>

  <div class="section">
    <label>
      参照物の実寸（cm）
      <input type="number" id="refLen" value="100">
    </label>
  </div>

  <button id="refBtn" class="refbtn">参照物を指定</button>
  <button id="calcBtn" class="primary">計算</button>
  <button id="resetBtn" class="reset">リセット</button>

  <div id="status"></div>
  <div id="summary"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const panel = document.getElementById("panel");
const guide = document.getElementById("guideOverlay");
const snapCheckbox = document.getElementById("snapVertical");
const status = document.getElementById("status");
const summary = document.getElementById("summary");

let img = new Image();
let points = [];
let refPoints = [];
let refMode = false;
let scale = 1, offsetX = 0, offsetY = 0;

/* DPR対応 */
function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width * dpr;
  canvas.height = r.height * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* 描画 */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);

  drawLine(refPoints,"#f59e0b");
  drawLine(points,"#dc2626");
}
function drawLine(arr,color){
  if(arr.length===2){
    ctx.strokeStyle=color;
    ctx.lineWidth=2/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

/* 座標 */
function getPos(e){
  const r = canvas.getBoundingClientRect();
  return {
    x:(e.clientX-r.left-offsetX)/scale,
    y:(e.clientY-r.top-offsetY)/scale
  };
}

/* 垂直スナップ */
function applyVerticalSnap(arr){
  if(arr.length===2 && snapCheckbox.checked){
    const x = (arr[0].x + arr[1].x)/2;
    arr[0].x = x;
    arr[1].x = x;
  }
}

/* フルスクリーン */
function enterFullscreen(){
  canvas.classList.add("fullscreen");
  panel.classList.add("hide");
  resizeCanvas();
}

/* 操作 */
canvas.onpointerdown = e => {
  const p = getPos(e);
  const arr = refMode ? refPoints : points;
  if(arr.length < 2){
    arr.push(p);
    applyVerticalSnap(arr);
    if(refMode && refPoints.length===2){
      refMode=false;
      status.textContent="参照物設定完了。次に測定対象を指定してください。";
    }
    draw();
  }
};

/* ボタン */
refBtn.onclick = ()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定してください。";
};
calcBtn.onclick = ()=>{
  if(refPoints.length!==2 || points.length!==2){
    status.innerHTML="<span class='ng'>点が足りません</span>";
    return;
  }
  const refCm = Number(refLen.value);
  const h = (Math.abs(points[1].y-points[0].y) /
             Math.abs(refPoints[1].y-refPoints[0].y))
             * (refCm/100);
  summary.innerHTML=`<div class="ok">${(h*100).toFixed(1)} cm</div>`;
};
resetBtn.onclick = ()=>{
  points=[]; refPoints=[];
  draw();
};

/* 初回ガイド */
if(!localStorage.getItem("heightToolGuideShown")){
  guide.classList.add("active");
  guide.onclick=()=>{
    guide.classList.remove("active");
    localStorage.setItem("heightToolGuideShown","1");
  };
}

/* 画像読み込み */
fileInput.onchange = e=>{
  const r = new FileReader();
  r.onload = ()=>{
    img.onload = ()=>{
      enterFullscreen(); // ✅ 自動フルスクリーン
      scale = canvas.clientWidth / img.width; // ✅ 横幅基準
      offsetX = 0;
      offsetY = (canvas.clientHeight - img.height*scale)/2;
      draw();
    };
    img.src = r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};

window.addEventListener("resize",()=>{
  resizeCanvas();
  draw();
});
</script>

</body>
</html>
