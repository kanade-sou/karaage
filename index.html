<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高さ推定ツール（スマホ完全安定・最終完成版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;}
header{padding:8px 12px;font-size:14px;background:#f3f4f6;}
canvas{
  display:block;
  width:100vw;
  height:70vh;
  background:#ddd;
  touch-action:none;
}
.panel{padding:10px;}
button,input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:15px;
}
.snap-option{
  display:flex;gap:10px;align-items:center;
  margin-top:8px;padding:10px;
  background:#f9fafb;border-radius:6px;
}
.refbtn{background:#f59e0b;color:#fff;font-weight:bold;}
.primary{background:#2563eb;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;}
.ng{color:#dc2626;}
</style>
</head>

<body>

<header>
①参照物(cm) → ②測定対象(cm) → ③計算  
（ピンチ拡大／移動／点はドラッグで微調整）
</header>

<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">
  <input type="number" id="refLen" value="100" placeholder="参照物の高さ（cm）">

  <div class="snap-option">
    <input type="checkbox" id="snapVertical" checked>
    <label>垂直スナップ（上下点を揃える）</label>
  </div>

  <button id="refBtn" class="refbtn">参照物を指定</button>
  <button id="calcBtn" class="primary">計算</button>
  <button id="resetBtn" class="reset">リセット</button>

  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const snapVertical = document.getElementById("snapVertical");
const status = document.getElementById("status");
const result = document.getElementById("result");

let img = new Image();

/* 表示状態 */
let scale=1, offsetX=0, offsetY=0;

/* 点 */
let points=[], refPoints=[], refMode=false;
let draggingPoint=null;

/* タッチ */
let startTouches=[], moved=false;

/* canvas */
function resize(){
  canvas.width=canvas.clientWidth;
  canvas.height=canvas.clientHeight;
  draw();
}
window.addEventListener("resize",resize);
resize();

/* 描画 */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);

  drawLine(refPoints,"#f59e0b");
  drawLine(points,"#dc2626");

  drawPoints(refPoints,"#f59e0b");
  drawPoints(points,"#dc2626");
}

function drawLine(arr,color){
  if(arr.length===2){
    ctx.strokeStyle=color;
    ctx.lineWidth=3/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

function drawPoints(arr,color){
  const r=8/scale;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
    ctx.lineWidth=2/scale;
    ctx.strokeStyle="#fff";
    ctx.stroke();
  });
}

/* 座標変換 */
function screenToWorld(x,y){
  return {
    x:(x-offsetX)/scale,
    y:(y-offsetY)/scale
  };
}

/* ===== 画面座標でヒット判定（重要） ===== */
function hitTest(clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  const sx=clientX-rect.left;
  const sy=clientY-rect.top;
  const hitRadius=15; // px

  const all=[...refPoints,...points];
  for(const p of all){
    const px=p.x*scale+offsetX;
    const py=p.y*scale+offsetY;
    if(Math.hypot(px-sx,py-sy)<=hitRadius){
      return p;
    }
  }
  return null;
}

/* 垂直スナップ */
function applyVerticalSnap(arr){
  if(arr.length===2 && snapVertical.checked){
    arr[1].x=arr[0].x;
  }
}

/* タッチ開始 */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  moved=false;
  startTouches=[...e.touches];

  if(e.touches.length===1){
    const t=e.touches[0];
    draggingPoint=hitTest(t.clientX,t.clientY);
  }
},{passive:false});

/* タッチ移動 */
canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  moved=true;

  if(draggingPoint && e.touches.length===1){
    const t=e.touches[0];
    const p=screenToWorld(t.clientX,t.clientY);
    draggingPoint.x=p.x;
    draggingPoint.y=p.y;

    if(refMode) applyVerticalSnap(refPoints);
    else applyVerticalSnap(points);

    draw();
    return;
  }

  if(e.touches.length===2 && startTouches.length===2){
    const [a,b]=e.touches,[a0,b0]=startTouches;
    const cx=(a.clientX+b.clientX)/2;
    const cy=(a.clientY+b.clientY)/2;
    const wx=(cx-offsetX)/scale;
    const wy=(cy-offsetY)/scale;
    scale*=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)/
           Math.hypot(a0.clientX-b0.clientX,a0.clientY-b0.clientY);
    scale=Math.min(Math.max(scale,0.2),10);
    offsetX=cx-wx*scale;
    offsetY=cy-wy*scale;
  }

  startTouches=[...e.touches];
  draw();
},{passive:false});

/* タッチ終了 */
canvas.addEventListener("touchend",e=>{
  if(!moved && e.changedTouches.length===1){
    const t=e.changedTouches[0];
    const p=screenToWorld(t.clientX,t.clientY);
    const arr=refMode?refPoints:points;
    if(arr.length<2){
      arr.push(p);
      applyVerticalSnap(arr);
      if(refMode && arr.length===2){
        refMode=false;
        status.textContent="参照物設定完了。次に測定対象を指定してください。";
      }
      draw();
    }
  }
  draggingPoint=null;
  startTouches=[];
});

/* ボタン */
refBtn.onclick=()=>{
  refMode=true;
  refPoints=[];
  status.textContent="参照物の上下2点を指定してください（cm基準）。";
};

calcBtn.onclick=()=>{
  if(refPoints.length!==2||points.length!==2){
    result.innerHTML="<span class='ng'>参照物と測定対象を指定してください</span>";
    return;
  }
  const refCm=Number(refLen.value);
  const h=Math.abs(points[1].y-points[0].y)/
          Math.abs(refPoints[1].y-refPoints[0].y)*refCm;
  result.innerHTML=`<span class="ok">推定高さ ${h.toFixed(1)} cm</span>`;
};

resetBtn.onclick=()=>{
  img.src="";
  points=[];refPoints=[];refMode=false;
  scale=1;offsetX=0;offsetY=0;
  status.textContent="";result.textContent="";
  draw();
};

/* 画像 */
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      points=[];refPoints=[];refMode=false;
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      status.textContent="画像を読み込みました。参照物を指定してください。";
      result.textContent="";
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
``
